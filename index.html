<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨별 음식 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>날씨별 음식 추천</h1>
            <button class="theme-toggle" type="button" aria-pressed="false" aria-label="다크 모드로 전환">
                <span class="theme-icon" aria-hidden="true">🌙</span>
                <span class="theme-label">다크 모드</span>
            </button>
        </div>
    </header>
    <main>
        <div class="weather-selection">
            <h2>오늘 날씨는 어떤가요?</h2>
            <div class="weather-options">
                <button class="weather-btn" data-weather="sunny">☀️ 맑음</button>
                <button class="weather-btn" data-weather="rainy">🌧️ 비</button>
                <button class="weather-btn" data-weather="snowy">❄️ 눈</button>
                <button class="weather-btn" data-weather="cloudy">☁️ 흐림</button>
            </div>
        </div>
        <div class="recommendation-container">
            <h2>오늘의 추천 메뉴</h2>
            <div id="food-recommendation"></div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
